<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scripts.&lt;yourname&gt;</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />

  <style>
    /* ============================================
       DESIGN TOKENS — edit freely
       ============================================ */
    :root {
      --bg:        #0d0f13;
      --surface:   #13161c;
      --border:    #1f242e;
      --accent:    #4fffb0;
      --accent2:   #ff6b6b;
      --muted:     #4a5568;
      --text:      #c9d1d9;
      --head:      #e6edf3;
      --radius:    6px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* ============================================
       HEADER
       ============================================ */
    header { margin-bottom: 64px; }

    .header-badge {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-badge::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(79,255,176,.4); }
      50%      { opacity: .7; box-shadow: 0 0 0 6px rgba(79,255,176,0); }
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--head);
      line-height: 1.1;
      letter-spacing: -.02em;
    }
    h1 span { color: var(--accent); }

    .tagline {
      margin-top: 16px;
      color: var(--muted);
      max-width: 500px;
      font-size: 13px;
    }

    /* ============================================
       SEARCH / FILTER BAR
       ============================================ */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { border-color: var(--accent); }

    .tag-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag-btn {
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      transition: all .15s;
    }
    .tag-btn:hover,
    .tag-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79,255,176,.06);
    }

    /* ============================================
       SCRIPT CARDS GRID
       ============================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, transform .15s;
      cursor: default;
    }
    .card:hover {
      border-color: rgba(79,255,176,.3);
      transform: translateY(-2px);
    }

    .card-header {
      padding: 20px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(79,255,176,.08);
      border: 1px solid rgba(79,255,176,.15);
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-meta { flex: 1; }

    .card-name {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 15px;
      color: var(--head);
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 20px 16px;
    }
    .chip {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(79,255,176,.07);
      color: var(--accent);
      border: 1px solid rgba(79,255,176,.15);
    }

    /* ============================================
       CODE SECTION — redesigned
       ============================================ */
    .code-section {
      border-top: 1px solid var(--border);
    }

    /* Tab bar: label on left, copy button on right — same row */
    .code-tabs {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding: 0 4px 0 0;
    }

    .code-tabs-left {
      display: flex;
    }

    .code-tab {
      padding: 9px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: all .15s;
      user-select: none;
    }
    .code-tab:hover { color: var(--text); }
    .code-tab.active {
      color: var(--accent);
      background: rgba(79,255,176,.04);
    }

    /* Copy button lives in the tab bar, right side */
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .copy-btn.copied {
      background: rgba(79,255,176,.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .code-block {
      display: none;
    }
    .code-block.active { display: block; }

    pre {
      padding: 20px 24px;
      overflow-x: auto;
      font-size: 12.5px;
      line-height: 1.8;
      color: #a8c0d6;
    }

    /* Options / Params table */
    .params-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      padding: 12px 20px 16px;
      display: table;
    }
    .params-table td {
      padding: 4px 8px 4px 0;
      vertical-align: top;
      color: var(--muted);
    }
    .params-table td:first-child {
      color: var(--accent);
      white-space: nowrap;
      min-width: 120px;
    }

    /* ============================================
       FOOTER
       ============================================ */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* highlight.js overrides */
    .hljs { background: transparent !important; padding: 0 !important; }
    pre code.hljs { display: block; }

    /* Empty state */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Animations */
    .card { animation: fadeUp .3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .20s; }
    .card:nth-child(5) { animation-delay: .25s; }
    .card:nth-child(6) { animation-delay: .30s; }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-badge">personal script library</div>
    <h1>Awesome<span>Scripts</span></h1>
    <p class="tagline">一些自用的脚本。</p>
  </header>

  <div class="toolbar">
    <input class="search-box" type="text" id="search" placeholder="$ search scripts..." />
    <div class="tag-filter" id="tagFilter"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <span>© 2025 <a href="https://sisyphite.github.io">@sisyphite</a></span>
    <span><a href="https://github.com/sisyphite">GitHub ↗</a></span>
  </footer>

</div>

<script>
base = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/')
const SCRIPTS = [
  {
    name: "update-macaddress.ps1",
    icon: "✦",
    desc: "通过注册表修改网卡驱动的 MAC 地址",
    tags: ["powershell", "mac-address"],
    lang: "powershell",
    examples: [
      {
        label: "基本用法",
        code: `irm ${base}update-macaddress.ps1 | iex`
      }
    ],
    params: []
  },
  {
    name: "activate-windows.win",
    icon: "✦",
    desc: "激活Windows及Office.此脚本Fork自国外大神，感谢",
    tags: ["powershell", "Windows", "Office"],
    lang: "powershell",
    examples: [
      {
        label: "基本用法",
        code: `irm ${base}activate-windows.win | iex`
      }
    ],
    params: []
  }
];

/* ── ENGINE ─────────────────────────────────────────────── */
const grid      = document.getElementById('grid');
const searchEl  = document.getElementById('search');
const tagFilter = document.getElementById('tagFilter');

const allTags = [...new Set(SCRIPTS.flatMap(s => s.tags))].sort();
let activeTag = null;

const allBtn = makeTagBtn('全部', null);
allBtn.classList.add('active');
tagFilter.appendChild(allBtn);
allTags.forEach(t => tagFilter.appendChild(makeTagBtn(t, t)));

function makeTagBtn(label, value) {
  const b = document.createElement('button');
  b.className = 'tag-btn';
  b.textContent = label;
  b.addEventListener('click', () => {
    activeTag = value;
    document.querySelectorAll('.tag-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
  return b;
}

function render() {
  const q = searchEl.value.toLowerCase();
  const filtered = SCRIPTS.filter(s => {
    const matchTag = !activeTag || s.tags.includes(activeTag);
    const matchQ   = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q));
    return matchTag && matchQ;
  });

  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⌀</div>没找到匹配的脚本</div>`;
    return;
  }
  filtered.forEach((s, i) => grid.appendChild(buildCard(s, i)));
  document.querySelectorAll('pre code').forEach(el => {
    if (window.hljs) hljs.highlightElement(el);
  });
}

function buildCard(s, i) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${i * 0.05}s`;

  const tagsHtml = s.tags.map(t => `<span class="chip">${t}</span>`).join('');

  // Params section
  let paramsHtml = '';
  if (s.params && s.params.length) {
    const rows = s.params.map(([flag, desc]) =>
      `<tr><td>${flag}</td><td>${desc}</td></tr>`
    ).join('');
    paramsHtml = `
      <div class="code-section">
        <div class="code-tabs">
          <div class="code-tabs-left">
            <div class="code-tab active">参数</div>
          </div>
        </div>
        <div class="code-block active">
          <table class="params-table"><tbody>${rows}</tbody></table>
        </div>
      </div>`;
  }

  // Examples section — copy button is in the tab bar, not overlapping code
  let exHtml = '';
  if (s.examples && s.examples.length) {
    const tabBtns = s.examples.map((e, idx) =>
      `<div class="code-tab${idx===0?' active':''}" data-idx="${idx}">${e.label}</div>`
    ).join('');

    const blocks = s.examples.map((e, idx) =>
      `<div class="code-block${idx===0?' active':''}" data-idx="${idx}">
        <pre><code class="language-${s.lang || 'bash'}">${escHtml(e.code)}</code></pre>
      </div>`
    ).join('');

    exHtml = `
      <div class="code-section">
        <div class="code-tabs ex-tabs">
          <div class="code-tabs-left">${tabBtns}</div>
          <button class="copy-btn">copy</button>
        </div>
        ${blocks}
      </div>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <div class="card-icon">${s.icon}</div>
      <div class="card-meta">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
    </div>
    <div class="card-tags">${tagsHtml}</div>
    ${paramsHtml}
    ${exHtml}
  `;

  // Tab switching
  card.querySelectorAll('.ex-tabs .code-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const idx = tab.dataset.idx;
      card.querySelectorAll('.ex-tabs .code-tab').forEach(t => t.classList.remove('active'));
      card.querySelectorAll('.code-block').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      card.querySelector(`.code-block[data-idx="${idx}"]`).classList.add('active');
    });
  });

  // Copy button — reads whichever code block is currently active
  card.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const activeBlock = btn.closest('.code-section').querySelector('.code-block.active pre');
      if (!activeBlock) return;
      navigator.clipboard.writeText(activeBlock.textContent.trim()).then(() => {
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
  });

  return card;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

searchEl.addEventListener('input', render);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/powershell.min.js"></script>
<script>render();</script>
</body>
</html>
